# Configuracoes do Servidor
server.port=8083
spring.application.name=order-service

# Configuracoes do H2 Database
spring.datasource.url=jdbc:h2:mem:orderdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Configuracoes do JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Console H2 (para debug)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# URLs dos outros microservicos
app.user-service.url=http://localhost:8081
app.product-service.url=http://localhost:8082

# Logs
logging.level.com.example.orderservice=DEBUG